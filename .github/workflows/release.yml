name: release

on:
  push:
    tags:
      # We tag releases as bare semver (e.g. `0.1.2`). The `v`-prefixed
      # form is also accepted in case the project ever flips convention
      # or someone uses it manually.
      - '[0-9]+.[0-9]+.[0-9]+*'
      - 'v[0-9]+.[0-9]+.[0-9]+*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to release (e.g. 0.1.2 or v0.1.2). Must already exist.'
        required: true

jobs:
  build:
    name: build (${{ matrix.os }}, ${{ matrix.backend }})
    runs-on: ${{ matrix.os }}
    # Match ci.yml: Windows is experimental until proven, but a missing
    # Windows binary should not block a tag release of macOS/Linux. The
    # publish job's `fail_on_unmatched_files` is relaxed accordingly.
    continue-on-error: ${{ matrix.experimental || false }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-14
            backend: metal
            target: macos-arm64
            experimental: false
          - os: ubuntu-latest
            backend: cpu
            target: linux-x86_64
            experimental: false
          - os: windows-latest
            backend: cpu
            target: windows-x86_64.exe
            experimental: true
    env:
      MACOSX_DEPLOYMENT_TARGET: "12.0"
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event.inputs.tag || github.ref }}

      - name: install linux deps
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential cmake git python3 libssl-dev

      - name: install macos deps
        if: runner.os == 'macOS'
        run: |
          if ! command -v cmake >/dev/null 2>&1; then brew install cmake; fi

      - name: install windows deps
        if: runner.os == 'Windows'
        run: |
          cmake --version
          python --version
          where cl.exe || true

      - name: setup msvc
        if: runner.os == 'Windows'
        uses: ilammy/msvc-dev-cmd@v1

      - name: build
        run: make build

      - name: smoke
        run: make smoke

      - name: stage artifact
        # Builds the versioned filename `chimera-<version>-<target>`, e.g.
        # chimera-0.1.2-macos-arm64. The version comes from the tag the
        # workflow was triggered on (bare semver like `0.1.2`, or a
        # `v`-prefixed form). The `${TAG#v}` strip is a no-op for bare
        # semver and removes the prefix from `v0.1.2`.
        run: |
          TAG="${{ github.event.inputs.tag || github.ref_name }}"
          VERSION="${TAG#v}"
          ARTIFACT="chimera-${VERSION}-${{ matrix.target }}"
          echo "artifact name: ${ARTIFACT}"

          mkdir -p dist
          # MSVC produces build/Release/chimera.exe; everywhere else it's
          # build/chimera. Probe and copy whichever exists.
          if [[ -f build/chimera ]]; then
            cp build/chimera "dist/${ARTIFACT}"
          elif [[ -f build/Release/chimera.exe ]]; then
            cp build/Release/chimera.exe "dist/${ARTIFACT}"
          elif [[ -f build/chimera.exe ]]; then
            cp build/chimera.exe "dist/${ARTIFACT}"
          else
            echo "could not locate built chimera binary" >&2
            ls -la build/ build/Release/ 2>&1 || true
            exit 1
          fi

          # Strip debug symbols + local symbol table before hashing so the
          # sha256 covers the bytes users actually download. MSVC release
          # builds on Windows don't embed debug info in the .exe (the PDB
          # lives in a sibling file we never copy), so strip(1) — which
          # isn't shipped with the Windows runner anyway — is a no-op for
          # us; skip it.
          size_before=$(wc -c < "dist/${ARTIFACT}")
          if [[ "${RUNNER_OS}" != "Windows" ]]; then
            strip "dist/${ARTIFACT}"
          fi
          size_after=$(wc -c < "dist/${ARTIFACT}")
          echo "stripped ${ARTIFACT}: ${size_before} -> ${size_after} bytes"

          (cd dist && \
            (sha256sum "${ARTIFACT}" 2>/dev/null || shasum -a 256 "${ARTIFACT}") \
            > "${ARTIFACT}.sha256")

      - uses: actions/upload-artifact@v7
        with:
          # upload-artifact name is for internal storage between jobs;
          # the version-suffixed filename inside `path` is what gets
          # downloaded + published.
          name: ${{ matrix.target }}
          path: dist/chimera-*-${{ matrix.target }}*
          if-no-files-found: error

  publish:
    needs: build
    # Run even if the Windows build failed -- macOS/Linux artifacts should
    # still publish. `if: always()` plus the relaxed file matcher below
    # mean a missing windows leg degrades the release rather than
    # aborting it.
    if: always() && (needs.build.result == 'success' || needs.build.result == 'failure')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.tag || github.ref }}

      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: list staged files
        run: ls -la dist/

      - name: extract release notes from CHANGELOG
        # Pulls the section under `## [<version>]` out of CHANGELOG.md
        # into release-notes.md, prefixed with a "Changes since the last
        # Release" header. The script falls back to `## [Unreleased]` if
        # the version-named section is missing or empty. Exit 0 = found
        # (release body comes from release-notes.md); exit 2 = nothing
        # to use (release body falls back to GitHub's auto-generated
        # commit-list notes).
        run: |
          TAG="${{ github.event.inputs.tag || github.ref_name }}"
          VERSION="${TAG#v}"
          if python3 scripts/release_notes.py "${VERSION}"; then
            echo "FOUND=1" >> "$GITHUB_ENV"
            echo "--- release-notes.md ---"
            cat release-notes.md
          else
            echo "FOUND=0" >> "$GITHUB_ENV"
          fi

      - name: create / update GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.tag || github.ref_name }}
          # Use our extracted CHANGELOG section when we found one; let
          # action-gh-release auto-generate notes otherwise.
          body_path: ${{ env.FOUND == '1' && 'release-notes.md' || '' }}
          generate_release_notes: ${{ env.FOUND != '1' }}
          # Glob picks up the versioned filenames produced by the build job
          # (`chimera-<version>-<target>` + the .sha256 sidecars).
          files: |
            dist/chimera-*-macos-arm64
            dist/chimera-*-macos-arm64.sha256
            dist/chimera-*-linux-x86_64
            dist/chimera-*-linux-x86_64.sha256
            dist/chimera-*-windows-x86_64.exe
            dist/chimera-*-windows-x86_64.exe.sha256
          # Don't fail the release if Windows artifacts are missing while
          # that leg is still experimental.
          fail_on_unmatched_files: false
