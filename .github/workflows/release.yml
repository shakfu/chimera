name: release

on:
  push:
    tags:
      # We tag releases as bare semver (e.g. `0.1.2`). The `v`-prefixed
      # form is also accepted in case the project ever flips convention
      # or someone uses it manually.
      - '[0-9]+.[0-9]+.[0-9]+*'
      - 'v[0-9]+.[0-9]+.[0-9]+*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to release (e.g. 0.1.2 or v0.1.2). Must already exist.'
        required: true

jobs:
  build:
    name: build (${{ matrix.os }}, ${{ matrix.backend }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-14
            backend: metal
            target: macos-arm64
          - os: ubuntu-latest
            backend: cpu
            target: linux-x86_64
          - os: windows-latest
            backend: cpu
            target: windows-x86_64
    env:
      MACOSX_DEPLOYMENT_TARGET: "12.0"
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event.inputs.tag || github.ref }}

      - name: install linux deps
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential cmake git python3 libssl-dev

      - name: install macos deps
        if: runner.os == 'macOS'
        run: |
          if ! command -v cmake >/dev/null 2>&1; then brew install cmake; fi

      - name: install windows deps
        if: runner.os == 'Windows'
        run: |
          cmake --version
          python --version
          where cl.exe || true

      - name: setup msvc
        if: runner.os == 'Windows'
        uses: ilammy/msvc-dev-cmd@v1

      - name: build
        run: make build

      - name: smoke
        run: make smoke

      - name: stage artifact
        # Builds the versioned, compressed archive `chimera-<version>-<target>.<ext>`,
        # e.g. `chimera-0.1.2-macos-arm64.tar.gz` or
        # `chimera-0.1.2-windows-x86_64.zip`. The bare binary name inside the
        # archive is `chimera` (or `chimera.exe`), matching what users expect
        # after extraction. The `${TAG#v}` strip is a no-op for bare semver
        # and removes the prefix from `v0.1.2`. No .sha256 sidecar is
        # produced; the GitHub release UI already displays a SHA-256 for
        # every uploaded asset.
        run: |
          TAG="${{ github.event.inputs.tag || github.ref_name }}"
          VERSION="${TAG#v}"
          STEM="chimera-${VERSION}-${{ matrix.target }}"

          mkdir -p dist stage

          # Locate the built binary. MSVC produces build/Release/chimera.exe;
          # everywhere else it's build/chimera (or build/chimera.exe on
          # mingw, which we don't currently use but probe defensively).
          if [[ -f build/chimera ]]; then
            BIN_SRC="build/chimera"
            BIN_NAME="chimera"
          elif [[ -f build/Release/chimera.exe ]]; then
            BIN_SRC="build/Release/chimera.exe"
            BIN_NAME="chimera.exe"
          elif [[ -f build/chimera.exe ]]; then
            BIN_SRC="build/chimera.exe"
            BIN_NAME="chimera.exe"
          else
            echo "could not locate built chimera binary" >&2
            ls -la build/ build/Release/ 2>&1 || true
            exit 1
          fi

          cp "${BIN_SRC}" "stage/${BIN_NAME}"

          # Strip debug symbols + local symbol table on unix. MSVC release
          # builds on Windows don't embed debug info in the .exe (the PDB
          # lives in a sibling file we never copy), and strip(1) isn't
          # shipped with the Windows runner anyway; skip it there.
          if [[ "${RUNNER_OS}" != "Windows" ]]; then
            size_before=$(wc -c < "stage/${BIN_NAME}")
            strip "stage/${BIN_NAME}"
            size_after=$(wc -c < "stage/${BIN_NAME}")
            echo "stripped ${BIN_NAME}: ${size_before} -> ${size_after} bytes"
          fi

          # Package. Windows gets a .zip (what Windows users expect);
          # everyone else gets .tar.gz. Naming the archive with the same
          # versioned stem keeps the release asset listing tidy.
          if [[ "${RUNNER_OS}" == "Windows" ]]; then
            ARCHIVE="${STEM}.zip"
            (cd stage && 7z a -tzip "../dist/${ARCHIVE}" "${BIN_NAME}") >/dev/null
          else
            ARCHIVE="${STEM}.tar.gz"
            tar -czf "dist/${ARCHIVE}" -C stage "${BIN_NAME}"
          fi
          echo "archive: dist/${ARCHIVE} ($(wc -c < "dist/${ARCHIVE}") bytes)"

      - uses: actions/upload-artifact@v7
        with:
          # upload-artifact name is for internal storage between jobs;
          # the versioned archive inside `path` is what gets published.
          name: ${{ matrix.target }}
          path: dist/chimera-*-${{ matrix.target }}.*
          if-no-files-found: error

  publish:
    needs: build
    # Strict: only publish when every matrix leg succeeded. A failure on
    # any platform (including Windows) aborts the release; no partial
    # releases.
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.tag || github.ref }}

      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: list staged files
        run: ls -la dist/

      - name: extract release notes from CHANGELOG
        # Pulls the section under `## [<version>]` out of CHANGELOG.md
        # into release-notes.md, prefixed with a "Changes since the last
        # Release" header. The script falls back to `## [Unreleased]` if
        # the version-named section is missing or empty. Exit 0 = found
        # (release body comes from release-notes.md); exit 2 = nothing
        # to use (release body falls back to GitHub's auto-generated
        # commit-list notes).
        run: |
          TAG="${{ github.event.inputs.tag || github.ref_name }}"
          VERSION="${TAG#v}"
          if python3 scripts/release_notes.py "${VERSION}"; then
            echo "FOUND=1" >> "$GITHUB_ENV"
            echo "--- release-notes.md ---"
            cat release-notes.md
          else
            echo "FOUND=0" >> "$GITHUB_ENV"
          fi

      - name: create / update GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.tag || github.ref_name }}
          # Use our extracted CHANGELOG section when we found one; let
          # action-gh-release auto-generate notes otherwise.
          body_path: ${{ env.FOUND == '1' && 'release-notes.md' || '' }}
          generate_release_notes: ${{ env.FOUND != '1' }}
          # Glob picks up the versioned archives produced by the build job:
          # `.tar.gz` for macOS/Linux, `.zip` for Windows. GitHub renders
          # a SHA-256 next to each uploaded asset so no sidecar is shipped.
          files: |
            dist/chimera-*-macos-arm64.tar.gz
            dist/chimera-*-linux-x86_64.tar.gz
            dist/chimera-*-windows-x86_64.zip
          # Strict: every glob must match. If any platform's archive is
          # missing, fail the publish so we don't ship a partial release.
          fail_on_unmatched_files: true
