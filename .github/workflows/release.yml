name: release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to release (e.g. v0.1.0). Must already exist.'
        required: true

jobs:
  build:
    name: build (${{ matrix.os }}, ${{ matrix.backend }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-14
            backend: metal
            artifact: chimera-macos-arm64
          - os: ubuntu-latest
            backend: cpu
            artifact: chimera-linux-x86_64
    env:
      MACOSX_DEPLOYMENT_TARGET: "12.0"
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.tag || github.ref }}

      - name: install linux deps
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential cmake git python3 libssl-dev

      - name: install macos deps
        if: runner.os == 'macOS'
        run: |
          if ! command -v cmake >/dev/null 2>&1; then brew install cmake; fi

      - name: build
        run: make build

      - name: smoke
        run: make smoke

      - name: stage artifact
        run: |
          mkdir -p dist
          cp build/chimera "dist/${{ matrix.artifact }}"
          (cd dist && \
            (sha256sum "${{ matrix.artifact }}" 2>/dev/null || shasum -a 256 "${{ matrix.artifact }}") \
            > "${{ matrix.artifact }}.sha256")

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: dist/${{ matrix.artifact }}*
          if-no-files-found: error

  publish:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: list staged files
        run: ls -la dist/

      - name: create / update GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.tag || github.ref_name }}
          generate_release_notes: true
          files: |
            dist/chimera-macos-arm64
            dist/chimera-macos-arm64.sha256
            dist/chimera-linux-x86_64
            dist/chimera-linux-x86_64.sha256
          fail_on_unmatched_files: true
